name: Update Flake
on:
  workflow_call:
    inputs:
      packages:
        description: 'Space-separated list of specific packages to update (empty for all)'
        required: false
        type: string
        default: ''
      inputs:
        description: 'Space-separated list of specific inputs to update (empty for all)'
        required: false
        type: string
        default: ''
      pr-labels:
        description: 'Comma-separated list of labels to add to PRs'
        required: false
        type: string
        default: 'dependencies,automated'
      auto-merge:
        description: 'Enable auto-merge for created pull requests'
        required: false
        type: boolean
        default: false
    secrets:
      APP_ID:
        description: 'GitHub App ID'
        required: true
      APP_PRIVATE_KEY:
        description: 'GitHub App private key'
        required: true
jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has-updates: ${{ steps.build-matrix.outputs.has-updates }}
    steps:
      - uses: actions/checkout@v6
      - name: Setup Nix
        uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://nix-community.cachix.org https://cache.mulatta.io
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.mulatta.io-1:DrV+Oy2azNyVKM7ihhD1QoOetRUnW+1G6RWToUpSO4U=
      - name: Build update matrix
        id: build-matrix
        env:
          PACKAGES: "${{ inputs.packages }}"
          INPUTS: "${{ inputs.inputs }}"
        run: .github/ci/discovery.py
  update:
    needs: discover
    if: needs.discover.outputs.has-updates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - name: Setup Nix
        uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            extra-substituters = https://nix-community.cachix.org https://cache.mulatta.io
            extra-trusted-public-keys = nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= cache.mulatta.io-1:DrV+Oy2azNyVKM7ihhD1QoOetRUnW+1G6RWToUpSO4U=
      - name: Set up git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Perform update
        id: update
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [[ "${{ matrix.type }}" = package ]]; then
            nix develop -c .github/ci/update.py "${{ matrix.type }}" "${{ matrix.name }}"
          else
            .github/ci/update.py "${{ matrix.type }}" "${{ matrix.name }}"
          fi
      - name: Create pull request
        if: steps.update.outputs.updated == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_LABELS: ${{ inputs.pr-labels }}
          AUTO_MERGE: ${{ inputs.auto-merge }}
          CHANGELOG_URL: ${{ steps.update.outputs.changelog }}
        run: |
          .github/ci/create_pr.py \
            "${{ matrix.type }}" \
            "${{ matrix.name }}" \
            "${{ matrix.current_version }}" \
            "${{ steps.update.outputs.new_version }}"
